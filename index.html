<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFace Flapper</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: linear-gradient(135deg, #11111e 0%, #1e1e2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        #setup-screen {
            background: rgba(42, 42, 64, 0.95);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
            width: 90%;
            max-width: 380px;
            z-index: 10;
            border: 2px solid #4ec0ca;
            backdrop-filter: blur(10px);
        }
        h2 { 
            font-size: 26px;
            margin-bottom: 25px; 
            color: #4ec0ca;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(78,192,202,0.3);
        }
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #b3b3cc;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #161623;
            border: 1px solid #3d3d5c;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        input[type="file"]:hover {
            border-color: #4ec0ca;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #4ec0ca, #3daab3);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(78,192,202,0.4);
            transition: 0.2s ease;
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(78,192,202,0.6);
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 85vh;
            max-height: 600px;
            border-radius: 16px;
            overflow: hidden;
            display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 4px solid #2a2a40;
        }
        canvas {
            width: 100%;
            height: 100%;
            background: #70c5ce;
            display: block;
        }
        #gameover-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(16, 16, 26, 0.85);
            backdrop-filter: blur(6px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }
        #gameover-screen h1 {
            color: #ff4d4d;
            font-size: 36px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255,77,77,0.5);
        }
        #final-score {
            font-size: 18px;
            color: #fff;
            margin-bottom: 30px;
        }
        .menu-btn {
            width: 220px;
            padding: 16px;
            margin: 12px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #fff;
        }
        .btn-restart { background: #4ec0ca; box-shadow: 0 4px 10px rgba(78,192,202,0.3); }
        .btn-home { background: #4e5cca; box-shadow: 0 4px 10px rgba(78,92,202,0.3); }
        .btn-settings { background: #5c667a; box-shadow: 0 4px 10px rgba(92,102,122,0.3); }
        
        .menu-btn:hover { transform: scale(1.05); }

        #countdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 6;
        }
        #countdown-text {
            font-size: 90px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.6);
            animation: popScale 0.8s ease infinite;
        }
        @keyframes popScale {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2>Flappy Customizer</h2>
        
        <div class="input-group">
            <label>1. Bird Face (Image):</label>
            <input type="file" id="bird-input" accept="image/*">
        </div>

        <div class="input-group">
            <label>2. Custom Background (Image):</label>
            <input type="file" id="bg-input" accept="image/*">
        </div>

        <div class="input-group">
            <label>3. Background Music (Loop Audio):</label>
            <input type="file" id="bg-music-input" accept="audio/*">
        </div>

        <div class="input-group">
            <label>4. Game Over Sound (SFX Audio):</label>
            <input type="file" id="gameover-sound-input" accept="audio/*">
        </div>

        <button id="start-btn" class="btn-primary">Start Game 🚀</button>
    </div>

    <div id="game-container">
        <div id="gameover-screen">
            <h1>Game Over</h1>
            <div id="final-score">Score: 0</div>
            <button class="menu-btn btn-restart" id="btn-restart">🔄 Restart</button>
            <button class="menu-btn btn-home" id="btn-home">🏠 Home</button>
            <button class="menu-btn btn-settings" id="btn-settings">⚙ Customizer</button>
        </div>

        <div id="countdown-overlay">
            <div id="countdown-text">3</div>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let birdImg = new Image();
        let bgImg = new Image();
        let bgMusic = null;
        let gameOverSound = null;

        function playPopSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            } catch (e) {}
        }

        function playGoSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + index * 0.06);
                    gain.gain.setValueAtTime(0.15, now + index * 0.06);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.06 + 0.2);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + index * 0.06);
                    osc.stop(now + index * 0.06 + 0.2);
                });
            } catch (e) {}
        }

        birdImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="20" cy="20" r="18" fill="yellow"/></svg>';

        let bird = { x: 50, y: 150, width: 40, height: 40, gravity: 0.4, lift: -8, velocity: 0 };
        let pipes = [];
        let pipeWidth = 65; 
        let pipeGap = 160;
        let frameCount = 0;
        let score = 0;
        let gameActive = false;
        let inCountdown = false;

        document.getElementById('start-btn').addEventListener('click', () => {
            const birdFile = document.getElementById('bird-input').files[0];
            const bgFile = document.getElementById('bg-input').files[0];
            const musicFile = document.getElementById('bg-music-input').files[0];
            const gameOverFile = document.getElementById('gameover-sound-input').files[0];

            if (birdFile) birdImg.src = URL.createObjectURL(birdFile);
            if (bgFile) bgImg.src = URL.createObjectURL(bgFile);
            if (gameOverFile) gameOverSound = new Audio(URL.createObjectURL(gameOverFile));
            if (musicFile) {
                bgMusic = new Audio(URL.createObjectURL(musicFile));
                bgMusic.loop = true;
                bgMusic.volume = 0.4;
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            startWithCountdown();
        });

        function startWithCountdown() {
            document.getElementById('gameover-screen').style.display = 'none';
            const overlay = document.getElementById('countdown-overlay');
            const text = document.getElementById('countdown-text');
            overlay.style.display = 'flex';
            inCountdown = true;
            resetGame();

            let count = 3;
            text.innerText = count;

            let interval = setInterval(() => {
                count--;
                if (count === 0) {
                    text.innerText = "GO! 🚀";
                    playGoSound();
                    if (bgMusic) bgMusic.play().catch(e => {});
                } else if (count < 0) {
                    clearInterval(interval);
                    overlay.style.display = 'none';
                    inCountdown = false;
                    gameActive = true;
                    draw();
                } else {
                    text.innerText = count;
                }
            }, 900);
        }

        function resetGame() {
            bird.y = 150;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frameCount = 0;
        }

        function drawRetroPipe(x, y, width, height, isTop) {
            let pipeGrad = ctx.createLinearGradient(x, 0, x + width, 0);
            pipeGrad.addColorStop(0.0, '#4b7d1a'); 
            pipeGrad.addColorStop(0.2, '#73bf2e'); 
            pipeGrad.addColorStop(0.5, '#bfff80'); 
            pipeGrad.addColorStop(0.8, '#73bf2e'); 
            pipeGrad.addColorStop(1.0, '#355912'); 

            ctx.fillStyle = pipeGrad;
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2.5;
            
            ctx.fillRect(x, y, width, height);
            ctx.strokeRect(x, y, width, height);

            let capWidth = width + 10;
            let capHeight = 28;
            let capX = x - 5;
            let capY = isTop ? (y + height - capHeight) : y;

            let capGrad = ctx.createLinearGradient(capX, 0, capX + capWidth, 0);
            capGrad.addColorStop(0.0, '#4b7d1a');
            capGrad.addColorStop(0.2, '#73bf2e');
            capGrad.addColorStop(0.5, '#bfff80');
            capGrad.addColorStop(0.8, '#73bf2e');
            capGrad.addColorStop(1.0, '#355912');

            ctx.fillStyle = capGrad;
            ctx.fillRect(capX, capY, capWidth, capHeight);
            ctx.strokeRect(capX, capY, capWidth, capHeight);
        }

        function draw() {
            if (!gameActive || inCountdown) return;

            if (bgImg.complete && bgImg.src && !bgImg.src.includes('undefined')) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#70c5ce';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            ctx.drawImage(birdImg, bird.x, bird.y, bird.width, bird.height);

            if (bird.y + bird.height >= canvas.height || bird.y <= 0) {
                gameOver();
            }

            if (frameCount % 110 === 0) {
                let topPipeHeight = Math.floor(Math.random() * (canvas.height / 2)) + 50;
                pipes.push({
                    x: canvas.width,
                    top: topPipeHeight,
                    bottom: canvas.height - topPipeHeight - pipeGap,
                    passed: false
                });
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 2.5;

                drawRetroPipe(pipes[i].x, 0, pipeWidth, pipes[i].top, true);
                drawRetroPipe(pipes[i].x, canvas.height - pipes[i].bottom, pipeWidth, pipes[i].bottom, false);

                if (bird.x < pipes[i].x + pipeWidth &&
                    bird.x + bird.width > pipes[i].x &&
                    (bird.y < pipes[i].top || bird.y + bird.height > canvas.height - pipes[i].bottom)) {
                    gameOver();
                }

                if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                    score++;
                    pipes[i].passed = true;
                }

                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 35px sans-serif';
            ctx.fillText(score, canvas.width / 2 - 10, 60);

            frameCount++;
            requestAnimationFrame(draw);
        }

        function gameOver() {
            gameActive = false;
            if (bgMusic) bgMusic.pause();
            
            if (gameOverSound) {
                gameOverSound.currentTime = 0;
                gameOverSound.play().catch(e => {});
            }

            document.getElementById('final-score').innerText = `Final Score: ${score}`;
            document.getElementById('gameover-screen').style.display = 'flex';
        }

        function stopGameOverSound() {
            if (gameOverSound) {
                gameOverSound.pause();
                gameOverSound.currentTime = 0;
            }
        }

        function goToHome() {
            stopGameOverSound();
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'block';
        }

        // ADDED FIX: Core Jump Action logic
        function jumpAction() {
            if (gameActive && !inCountdown) {
                bird.velocity = bird.lift;
                playPopSound();
            }
        }

        document.getElementById('btn-restart').addEventListener('click', () => {
            stopGameOverSound();
            startWithCountdown();
        });

        document.getElementById('btn-home').addEventListener('click', goToHome);
        document.getElementById('btn-settings').addEventListener('click', goToHome); 

        // Touch & Key listeners linked to jumpAction
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') jumpAction(); });
        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            jumpAction();
        });
    </script>
</body>
</html>
