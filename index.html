<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Custom Flappy Bird Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #1e1e2f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        #setup-screen {
            background: #2a2a40;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 360px;
            z-index: 10;
        }
        h2 { margin-bottom: 20px; color: #4ec0ca; }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }
        input[type="file"] {
            width: 100%;
            padding: 8px;
            background: #1e1e2f;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4ec0ca;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 85vh;
            max-height: 600px;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            width: 100%;
            height: 100%;
            background: #70c5ce;
            display: block;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2>Flappy Customizer</h2>
        
        <div class="input-group">
            <label>1. Bird Face (Image):</label>
            <input type="file" id="bird-input" accept="image/*">
        </div>

        <div class="input-group">
            <label>2. Custom Background (Image):</label>
            <input type="file" id="bg-input" accept="image/*">
        </div>

        <div class="input-group">
            <label>3. Background Music (Loop Audio):</label>
            <input type="file" id="bg-music-input" accept="audio/*">
        </div>

        <div class="input-group">
            <label>4. Game Over Sound (SFX Audio):</label>
            <input type="file" id="gameover-sound-input" accept="audio/*">
        </div>

        <button id="start-btn">Start Game 🚀</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let birdImg = new Image();
        let bgImg = new Image();
        let bgMusic = null;
        let gameOverSound = null;

        // Permanent Default Pop Sound (Web Audio API generated)
        function playPopSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                // Quick frequency slide up creates the "pop" feel
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.08);
                
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            } catch (e) {
                console.log("Audio Context block bypass");
            }
        }

        // Default yellow circle bird if nothing is uploaded
        birdImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="20" cy="20" r="18" fill="yellow"/></svg>';

        let bird = { x: 50, y: 150, width: 40, height: 40, gravity: 0.4, lift: -8, velocity: 0 };
        let pipes = [];
        let pipeWidth = 60;
        let pipeGap = 160;
        let frameCount = 0;
        let score = 0;
        let gameActive = false;

        document.getElementById('start-btn').addEventListener('click', () => {
            const birdFile = document.getElementById('bird-input').files[0];
            const bgFile = document.getElementById('bg-input').files[0];
            const musicFile = document.getElementById('bg-music-input').files[0];
            const gameOverFile = document.getElementById('gameover-sound-input').files[0];

            if (birdFile) birdImg.src = URL.createObjectURL(birdFile);
            if (bgFile) bgImg.src = URL.createObjectURL(bgFile);
            if (gameOverFile) gameOverSound = new Audio(URL.createObjectURL(gameOverFile));
            if (musicFile) {
                bgMusic = new Audio(URL.createObjectURL(musicFile));
                bgMusic.loop = true;
                bgMusic.volume = 0.4;
                bgMusic.play().catch(e => console.log("Audio waiting for user click"));
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            gameActive = true;
            resetGame();
            draw();
        });

        function resetGame() {
            bird.y = 150;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frameCount = 0;
        }

        function draw() {
            if (!gameActive) return;

            // Background
            if (bgImg.complete && bgImg.src && !bgImg.src.includes('undefined')) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#70c5ce';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Bird physics
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            ctx.drawImage(birdImg, bird.x, bird.y, bird.width, bird.height);

            if (bird.y + bird.height >= canvas.height || bird.y <= 0) {
                gameOver();
            }

            // Pipes
            if (frameCount % 110 === 0) {
                let topPipeHeight = Math.floor(Math.random() * (canvas.height / 2)) + 50;
                pipes.push({
                    x: canvas.width,
                    top: topPipeHeight,
                    bottom: canvas.height - topPipeHeight - pipeGap,
                    passed: false
                });
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 2.5;

                ctx.fillStyle = '#73bf2e';
                ctx.fillRect(pipes[i].x, 0, pipeWidth, pipes[i].top);
                ctx.fillRect(pipes[i].x, canvas.height - pipes[i].bottom, pipeWidth, pipes[i].bottom);

                if (bird.x < pipes[i].x + pipeWidth &&
                    bird.x + bird.width > pipes[i].x &&
                    (bird.y < pipes[i].top || bird.y + bird.height > canvas.height - pipes[i].bottom)) {
                    gameOver();
                }

                if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                    score++;
                    pipes[i].passed = true;
                }

                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 35px sans-serif';
            ctx.fillText(score, canvas.width / 2 - 10, 60);

            frameCount++;
            requestAnimationFrame(draw);
        }

        function gameOver() {
            gameActive = false;
            if (bgMusic) bgMusic.pause();
            
            // Play Custom Game Over sound if uploaded
            if (gameOverSound) {
                gameOverSound.currentTime = 0;
                gameOverSound.play().catch(e => {});
            }

            alert(`Game Over! Score: ${score}`);
            document.getElementById('setup-screen').style.display = 'block';
            document.getElementById('game-container').style.display = 'none';
        }

        function jumpAction() {
            if (gameActive) {
                bird.velocity = bird.lift;
                // Instant Permanent Pop Sound on Click/Tap
                playPopSound();
                
                if (bgMusic && bgMusic.paused) {
                    bgMusic.play().catch(e => {});
                }
            }
        }

        // Event Listeners for Controls
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') jumpAction(); });
        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            jumpAction();
        });
    </script>
</body>
</html>
